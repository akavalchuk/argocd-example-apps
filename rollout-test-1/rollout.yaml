apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: rollouts-demo
  namespace: test-rollout-links
spec:
  replicas: 3
  strategy:
    canary:
      steps:
        - setWeight: 25
        - pause: {}
  selector:
    matchLabels: { app: rollouts-demo }
  template:
    metadata:
      labels: { app: rollouts-demo }
    spec:
      containers:
        - name: rollouts-demo
          image: argoproj/rollouts-demo:blue
          ports: [{ containerPort: 8080 }]
